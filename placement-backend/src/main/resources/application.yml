spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/placement_db
    username: placement_user
    password: placement_pass
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB

clerk:
  jwt:
    issuer: https://fit-gazelle-0.clerk.accounts.dev
    secret-key: ${CLERK_SECRET_KEY:default-secret-key-that-is-secure-and-long-enough-32-chars}

server:
  port: 8081
  error:
    include-message: always

logging:
  level:
    com.placement: DEBUG

gemini:
  api-key: ${GEMINI_API_KEY:}