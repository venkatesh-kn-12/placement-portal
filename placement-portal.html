  const avgSS=Math.round(students.reduce((a,s)=>a+s.softSkillsScore,0)/(students.length||1));
  const avgCode=Math.round(students.reduce((a,s)=>a+s.codingScore,0)/(students.length||1));
  const ready=students.filter(s=>Math.round((s.aptitudeScore*.25)+(s.softSkillsScore*.2)+(s.codingScore*.25)+(s.projectScore*4)+(s.certScore*4))>=75);

  // Student-specific report
  const isStudent=user.role==='student';
  const me=isStudent?(users.find(u=>u.id===user.id)||user):null;
  const mySubmissions=isStudent?submissions.filter(s=>s.studentId===user.id):[];

  const handlePrint=()=>{
    window.print();
    showToast('Opened print dialog — save as PDF!');
  };

  const handleEmailSim=()=>{
    showToast('Report sent to '+user.email+' (simulated)','success');
    const notifs=DB.get('notifications')||[];
    notifs.push({id:'n'+Date.now(),userId:user.id,title:'Report Exported',message:'Your placement readiness report was sent to '+user.email,type:'success',read:false,createdAt:new Date().toISOString().split('T')[0]});
    DB.set('notifications',notifs);
  };

  return(
    <div id="printable-report">
      <div className="section-header no-print">
        <div><div className="section-title">📄 Reports & Export</div><div className="section-sub">Generate and download placement reports</div></div>
        <div style={{display:'flex',gap:'8px'}}>
          <button className="btn-sm btn-outline" onClick={handleEmailSim}>📧 Email Report</button>
          <button className="btn-sm btn-brand" onClick={handlePrint}>🖨️ Export PDF</button>
        </div>
      </div>

      {/* Header block for print */}
      <div className="report-section" style={{background:'linear-gradient(135deg,var(--brand),var(--brand-mid))',color:'#fff',border:'none'}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',flexWrap:'wrap',gap:'1rem'}}>
          <div>
            <div style={{fontSize:'1.5rem',fontWeight:700,marginBottom:'.25rem'}}>🎯 PlaceTrack</div>
            <div style={{opacity:.85}}>{isStudent?'Student Placement Readiness Report':'Batch Placement Analytics Report'}</div>
            <div style={{fontSize:'.8rem',opacity:.7,marginTop:'.25rem'}}>Generated: {new Date().toLocaleDateString('en-IN',{year:'numeric',month:'long',day:'numeric'})}</div>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'2.2rem',fontWeight:700}}>{isStudent?Math.round((me.aptitudeScore*.25)+(me.softSkillsScore*.2)+(me.codingScore*.25)+(me.projectScore*4)+(me.certScore*4))+'%':Math.round(students.reduce((a,s)=>a+Math.round((s.aptitudeScore*.25)+(s.softSkillsScore*.2)+(s.codingScore*.25)),0)/(students.length||1))+'%'}</div>
            <div style={{opacity:.8,fontSize:'.85rem'}}>{isStudent?'Readiness Score':'Avg Batch Readiness'}</div>
          </div>
        </div>
      </div>

      {isStudent?(
        <>
          <div className="report-section">
            <h3 style={{marginBottom:'1rem',fontSize:'1rem',fontWeight:700}}>👤 Student Information</h3>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'12px'}}>
              {[{l:'Name',v:me.name},{l:'USN',v:me.usn},{l:'Department',v:me.department},{l:'Year',v:me.year},{l:'Batch',v:me.batch},{l:'Email',v:me.email}].map(r=>(
                <div key={r.l} style={{display:'flex',justifyContent:'space-between',padding:'.5rem 0',borderBottom:'1px solid var(--border)'}}>
                  <span style={{fontSize:'.85rem',color:'var(--text3)'}}>{r.l}</span>
                  <span style={{fontSize:'.85rem',fontWeight:500}}>{r.v}</span>
                </div>
              ))}
            </div>
          </div>
          <div className="report-section">
            <h3 style={{marginBottom:'1rem',fontSize:'1rem',fontWeight:700}}>📊 Skill Scores</h3>
            {[{l:'Aptitude',v:me.aptitudeScore,c:'var(--brand)'},{l:'Soft Skills',v:me.softSkillsScore,c:'#8B5CF6'},{l:'Coding',v:me.codingScore,c:'var(--accent)'},{l:'Projects',v:me.projectScore*20,c:'var(--warn)'},{l:'Certificates',v:me.certScore*20,c:'var(--danger)'}].map(r=>(
              <div key={r.l} style={{display:'flex',alignItems:'center',gap:'12px',marginBottom:'.75rem'}}>
                <span style={{width:'90px',fontSize:'.85rem',color:'var(--text2)',fontWeight:500}}>{r.l}</span>
                <ProgressBar value={r.v} color={r.c}/>
                <span style={{width:'40px',textAlign:'right',fontWeight:700,color:r.c,fontSize:'.85rem'}}>{r.v}%</span>
              </div>
            ))}
          </div>
          <div className="report-section">
            <h3 style={{marginBottom:'1rem',fontSize:'1rem',fontWeight:700}}>📂 Submissions Summary</h3>
            {mySubmissions.length===0?<p style={{color:'var(--text3)'}}>No submissions yet</p>:(
              <table className="data-table" style={{borderRadius:'var(--radius)',overflow:'hidden'}}>
                <thead><tr><th>Title</th><th>Type</th><th>Status</th><th>Rating</th></tr></thead>
                <tbody>{mySubmissions.map(s=>(
                  <tr key={s.id}>
                    <td style={{fontWeight:500}}>{s.title}</td>
                    <td><Badge type="info">{s.type}</Badge></td>
                    <td><Badge type={s.status==='reviewed'?'success':'warn'}>{s.status}</Badge></td>
                    <td><Stars value={s.facultyRating} readOnly/></td>
                  </tr>
                ))}</tbody>
              </table>
            )}
          </div>
        </>
      ):(
        <>
          <div className="report-section">
            <h3 style={{marginBottom:'1rem',fontSize:'1rem',fontWeight:700}}>📈 Batch Overview</h3>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(140px,1fr))',gap:'1rem'}}>
              {[{l:'Total Students',v:students.length},{l:'Avg Aptitude',v:avgApt+'%'},{l:'Avg Soft Skills',v:avgSS+'%'},{l:'Avg Coding',v:avgCode+'%'},{l:'Placement Ready',v:ready.length},{l:'Total Submissions',v:submissions.length},{l:'Placements',v:placements.length}].map(i=>(
                <div key={i.l} style={{background:'var(--surface2)',borderRadius:'var(--radius)',padding:'1rem',textAlign:'center'}}>
                  <div style={{fontSize:'1.4rem',fontWeight:700,color:'var(--brand)'}}>{i.v}</div>
                  <div style={{fontSize:'.75rem',color:'var(--text3)',marginTop:'2px'}}>{i.l}</div>
                </div>
              ))}
            </div>
          </div>
          <div className="report-section">
            <h3 style={{marginBottom:'1rem',fontSize:'1rem',fontWeight:700}}>🏆 Top Performers</h3>
            <table className="data-table">
              <thead><tr><th>Rank</th><th>Name</th><th>Department</th><th>Aptitude</th><th>Coding</th><th>Readiness</th></tr></thead>
              <tbody>
                {[...students].sort((a,b)=>(b.aptitudeScore+b.codingScore)-(a.aptitudeScore+a.codingScore)).slice(0,8).map((s,i)=>{
                  const r=Math.round((s.aptitudeScore*.25)+(s.softSkillsScore*.2)+(s.codingScore*.25)+(s.projectScore*4)+(s.certScore*4));
                  return(
                    <tr key={s.id}>
                      <td><Badge type={i<3?'success':'neutral'}>#{i+1}</Badge></td>
                      <td style={{fontWeight:500}}>{s.name}</td>
                      <td style={{fontSize:'.8rem',color:'var(--text2)'}}>{s.department}</td>
                      <td>{s.aptitudeScore}%</td>
                      <td>{s.codingScore}%</td>
                      <td><Badge type={r>=75?'success':r>=50?'warn':'danger'}>{r}%</Badge></td>
                    </tr>
                  );
                })}
              </tbody>
            </table>
          </div>
        </>
      )}
      <div className="report-section" style={{textAlign:'center',color:'var(--text3)',fontSize:'.8rem',padding:'1rem'}}>
        Generated by PlaceTrack Portal · {new Date().toLocaleString('en-IN')}
      </div>
    </div>
  );
};

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
const App=()=>{
  const [user,setUser]=useState(()=>DB.get('currentUser'));
  const [activePage,setActivePage]=useState('dashboard');
  const [showNotifs,setShowNotifs]=useState(false);
  const [sidebarOpen,setSidebarOpen]=useState(false);
  const showToast=useContext(ToastCtx);
  const {dark}=useContext(DarkCtx);

  const handleAuth=(u)=>{ setUser(u); setActivePage('dashboard'); };
  const handleLogout=()=>{ DB.del('currentUser'); setUser(null); setActivePage('dashboard'); };

  const notifications=(DB.get('notifications')||[]).filter(n=>n.userId===user?.id&&!n.read);

  const handleOnboardingComplete=(updatedUser)=>{
    setUser(updatedUser);
    setActivePage('dashboard');
  };

  const handleNav=(page)=>{
    setActivePage(page);
    setSidebarOpen(false);
  };

  if(!user) return <LoginPage onAuth={handleAuth}/>;
  if(user.role==='student'&&!user.onboardingDone) return(
    <div style={{minHeight:'100vh'}}>
      <div style={{background:'var(--brand)',padding:'.875rem 2rem',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div style={{display:'flex',alignItems:'center',gap:'10px',color:'#fff',fontFamily:"'Space Grotesk',sans-serif",fontWeight:700,fontSize:'1rem'}}>
          <span>🎯</span> PlaceTrack — Onboarding
        </div>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <span style={{color:'rgba(255,255,255,.7)',fontSize:'.8rem'}}>Dark</span>
          <DarkToggle/>
          <button className="logout-btn" style={{color:'rgba(255,255,255,.8)',background:'none'}} onClick={handleLogout}>Sign out</button>
        </div>
      </div>
      <OnboardingFlow user={user} onComplete={handleOnboardingComplete}/>
    </div>
  );

  const pendingReviews=(DB.get('submissions')||[]).filter(s=>s.status==='pending').length;

  // Extended nav configs with new pages
  const extraStudentNav={
    dashboard:<StudentDashboard user={user} onNav={handleNav}/>,
    profile:<StudentProfilePage user={user}/>,
    aptitude:<AssessmentPage user={user} type="aptitude"/>,
    softskills:<AssessmentPage user={user} type="softskills"/>,
    coding:<AssessmentPage user={user} type="coding"/>,
    goals:<GoalsPage user={user}/>,
    submissions:<SubmissionsPage user={user}/>,
    certificates:<CertificatesPage user={user}/>,
    roadmap:<CareerRoadmapPage user={user}/>,
    leaderboard:<LeaderboardPage user={user}/>,
    interviews:<InterviewPrepPage/>,
    aicoach:<AICoachPage user={user}/>,
    companymatch:<CompanyMatchPage user={user}/>,
    reports:<ReportsPage user={user}/>,
  };

  const extraFacultyNav={
    dashboard:<FacultyDashboard/>,
    students:<FacultyStudentsPage/>,
    review:<FacultyReviewPage facultyUser={user}/>,
    ratings:<FacultyRatingPage facultyUser={user}/>,
    certificates:<FacultyReviewPage facultyUser={user}/>,
    analytics:<FacultyAnalyticsPage/>,
    reports:<ReportsPage user={user}/>,
    questionbank:<QuestionBankPage facultyUser={user}/>,
  };

  const extraAdminNav={
    dashboard:<AdminDashboard/>,
    users:<AdminUserManagement/>,
    students:<FacultyStudentsPage/>,
    faculty:<AdminUserManagement/>,
    analytics:<FacultyAnalyticsPage/>,
    placements:<AdminPlacementsPage/>,
    reports:<ReportsPage user={user}/>,
    settings:<div className="card"><div className="card-title" style={{marginBottom:'1rem'}}>⚙️ System Settings</div><p style={{color:'var(--text2)'}}>Settings panel — configure platform preferences.</p></div>,
  };

  const navMap=user.role==='student'?extraStudentNav:user.role==='faculty'?extraFacultyNav:extraAdminNav;
  const renderedPage=navMap[activePage]||navMap['dashboard'];

  // Updated nav configs with new pages
  const fullNavConfig={
    student:[
      {section:'Overview',items:[{key:'dashboard',icon:'🏠',label:'Dashboard'},{key:'profile',icon:'👤',label:'My Profile'}]},
      {section:'Assessments',items:[{key:'aptitude',icon:'🧠',label:'Aptitude Test'},{key:'softskills',icon:'💬',label:'Soft Skills'},{key:'coding',icon:'💻',label:'Coding Test'},{key:'goals',icon:'🎯',label:'Goal Setting'}]},
      {section:'Portfolio',items:[{key:'submissions',icon:'📂',label:'My Submissions'},{key:'certificates',icon:'🏆',label:'Certificates'},{key:'roadmap',icon:'🗺️',label:'Career Roadmap'}]},
      {section:'Compete',items:[{key:'leaderboard',icon:'📊',label:'Leaderboard'},{key:'companymatch',icon:'🏢',label:'Company Match'},{key:'interviews',icon:'🎤',label:'Interview Prep'}]},
      {section:'AI & Reports',items:[{key:'aicoach',icon:'🤖',label:'AI Coach'},{key:'reports',icon:'📄',label:'My Report'}]},
    ],
    faculty:[
      {section:'Overview',items:[{key:'dashboard',icon:'🏠',label:'Dashboard'},{key:'students',icon:'👥',label:'My Students'}]},
      {section:'Grading',items:[{key:'review',icon:'📋',label:'Review Submissions'},{key:'ratings',icon:'⭐',label:'Rate Students'},{key:'certificates',icon:'🔍',label:'Verify Certificates'}]},
      {section:'Tools',items:[{key:'questionbank',icon:'📝',label:'Question Bank'},{key:'analytics',icon:'📈',label:'Analytics'},{key:'reports',icon:'📄',label:'Reports & Export'}]},
    ],
    admin:[
      {section:'Overview',items:[{key:'dashboard',icon:'🏠',label:'Dashboard'},{key:'users',icon:'👥',label:'User Management'}]},
      {section:'Management',items:[{key:'students',icon:'🎓',label:'All Students'},{key:'faculty',icon:'👩‍🏫',label:'Faculty'}]},
      {section:'Analytics',items:[{key:'analytics',icon:'📈',label:'Analytics'},{key:'placements',icon:'💼',label:'Placement Tracking'},{key:'reports',icon:'📄',label:'Reports & Export'}]},
      {section:'Settings',items:[{key:'settings',icon:'⚙️',label:'System Settings'}]},
    ],
  };

  const pageTitle={
    dashboard:'Dashboard',profile:'My Profile',aptitude:'Aptitude Test',softskills:'Soft Skills',
    coding:'Coding Test',goals:'Career Goals',submissions:'Submissions',certificates:'Certificates',
    roadmap:'Career Roadmap',leaderboard:'Leaderboard',companymatch:'Company Match',
    interviews:'Interview Prep',aicoach:'AI Coach',students:'Students',
    review:'Review Submissions',ratings:'Rate Students',analytics:'Analytics',
    reports:'Reports & Export',users:'User Management',placements:'Placement Tracking',
    settings:'Settings',questionbank:'Question Bank Editor',
  }[activePage]||'Dashboard';

  return(
    <div className="app-shell">
      <Sidebar
        user={user}
        active={activePage}
        onNav={handleNav}
        onLogout={handleLogout}
        notifCount={pendingReviews}
        open={sidebarOpen}
        onClose={()=>setSidebarOpen(false)}
        navOverride={fullNavConfig[user.role]}
      />
      <div className="main-content">
        <div className="topbar">
          <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
            <button className="hamburger" onClick={()=>setSidebarOpen(o=>!o)} aria-label="Toggle menu">☰</button>
            <div>
              <div className="topbar-title">{pageTitle}</div>
              <div style={{fontSize:'.75rem',color:'var(--text3)'}}>
                {user.role==='student'&&`${user.department} · ${user.year}`}
                {user.role==='faculty'&&`Faculty · ${user.department}`}
                {user.role==='admin'&&'System Administrator'}
              </div>
            </div>
          </div>
          <div className="topbar-right">
            <div className="notif-btn" onClick={()=>setShowNotifs(true)} title="Notifications">
              🔔
              {notifications.length>0&&<div className="notif-dot"/>}
            </div>
            <div style={{display:'flex',alignItems:'center',gap:'8px',background:'var(--surface3)',borderRadius:'var(--radius)',padding:'.4rem .75rem',cursor:'pointer'}} onClick={()=>handleNav(user.role==='student'?'profile':'dashboard')}>
              <Avatar name={user.name} size={28}/>
              <span style={{fontSize:'.8rem',fontWeight:600}}>{user.name.split(' ')[0]}</span>
            </div>
          </div>
        </div>
        <div className="page-content">{renderedPage}</div>
      </div>
      {showNotifs&&<NotificationsPanel user={user} onClose={()=>setShowNotifs(false)}/>}
    </div>
  );
};

// ─── DARK PROVIDER ────────────────────────────────────────────────────────────
const DarkProvider=({children})=>{
  const [dark,setDark]=useState(()=>DB.get('darkMode')===true);
  useEffect(()=>{
    document.body.classList.toggle('dark',dark);
    DB.set('darkMode',dark);
  },[dark]);
  const toggle=useCallback(()=>setDark(d=>!d),[]);
  return <DarkCtx.Provider value={{dark,toggle}}>{children}</DarkCtx.Provider>;
};

// ─── ROOT ──────────────────────────────────────────────────────────────────────
const Root=()=>(
  <DarkProvider>
    <ToastProvider>
      <AuthCtx.Provider value={null}>
        <App/>
      </AuthCtx.Provider>
    </ToastProvider>
  </DarkProvider>
);
ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);
</script>
</body>
</html>
