<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PlaceTrack — Placement Readiness Portal</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --brand:#4F46E5;--brand-dark:#3730A3;--brand-light:#EEF2FF;--brand-mid:#6366F1;
  --accent:#10B981;--accent-light:#D1FAE5;
  --warn:#F59E0B;--warn-light:#FEF3C7;
  --danger:#EF4444;--danger-light:#FEE2E2;
  --info:#3B82F6;--info-light:#DBEAFE;
  --surface:#FFFFFF;--surface2:#F8FAFC;--surface3:#F1F5F9;
  --border:#E2E8F0;--border2:#CBD5E1;
  --text:#0F172A;--text2:#475569;--text3:#94A3B8;
  --radius:12px;--radius-sm:8px;--radius-lg:16px;--radius-xl:24px;
  --shadow:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.04);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.1),0 2px 4px -1px rgba(0,0,0,.06);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.1),0 4px 6px -2px rgba(0,0,0,.05);
  --sidebar:260px;
}
/* ── DARK MODE ── */
body.dark{
  --brand:#818CF8;--brand-dark:#6366F1;--brand-light:#1e1b4b;--brand-mid:#A5B4FC;
  --accent:#34D399;--accent-light:#064e3b;
  --warn:#FBBF24;--warn-light:#451a03;
  --danger:#F87171;--danger-light:#450a0a;
  --info:#60A5FA;--info-light:#1e3a5f;
  --surface:#1E1E2E;--surface2:#16161e;--surface3:#2a2a3e;
  --border:#2e2e45;--border2:#3f3f5a;
  --text:#E2E8F0;--text2:#94A3B8;--text3:#64748B;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 6px -1px rgba(0,0,0,.5),0 2px 4px -1px rgba(0,0,0,.3);
  --shadow-lg:0 10px 15px -3px rgba(0,0,0,.5),0 4px 6px -2px rgba(0,0,0,.3);
}
body.dark .auth-wrap{background:linear-gradient(135deg,#0f0e1a 0%,#1a1830 40%,#2d2a6e 100%)}
body.dark .auth-right{background:#1E1E2E;color:var(--text)}
body.dark .form-input,body.dark .form-select{background:var(--surface3);color:var(--text);border-color:var(--border2)}
body.dark .option{border-color:var(--border2)}
body.dark .option:hover{background:var(--brand-light)}
body.dark .data-table th{background:var(--surface3)}
body.dark .quiz-wrap .question-card{background:var(--surface)}
body.dark .auth-captcha-wrap{background:var(--surface3);border-color:var(--border2)}
body.dark .captcha-input{background:var(--surface);color:var(--text);border-color:var(--border2)}

/* ── DARK MODE TOGGLE BUTTON ── */
.dark-toggle{width:40px;height:22px;border-radius:11px;border:none;cursor:pointer;position:relative;transition:background .25s;flex-shrink:0}
.dark-toggle.off{background:#CBD5E1}
.dark-toggle.on{background:var(--brand)}
.dark-toggle-thumb{position:absolute;top:3px;width:16px;height:16px;border-radius:50%;background:#fff;transition:left .25s;box-shadow:0 1px 3px rgba(0,0,0,.3)}
.dark-toggle.off .dark-toggle-thumb{left:3px}
.dark-toggle.on .dark-toggle-thumb{left:21px}

/* ── MOBILE SIDEBAR OVERLAY ── */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;backdrop-filter:blur(2px)}
.hamburger{display:none;width:36px;height:36px;background:var(--surface3);border-radius:9px;align-items:center;justify-content:center;font-size:18px;cursor:pointer;border:none;color:var(--text2);flex-shrink:0}

/* ── COMPANY MATCH ── */
.company-match-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem;transition:all .2s;cursor:default}
.company-match-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.match-bar{height:8px;border-radius:4px;background:var(--surface3);overflow:hidden;margin:.5rem 0}
.match-fill{height:100%;border-radius:4px;transition:width .8s ease}
.match-tag{display:inline-block;padding:.18rem .5rem;border-radius:6px;font-size:.7rem;font-weight:600;margin:.15rem;background:var(--surface3);color:var(--text2)}

/* ── PDF / REPORT EXPORT ── */
.report-section{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1rem}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main-content{margin-left:0!important}
  .page-content{padding:0!important}
  body{background:#fff!important;color:#000!important}
}

/* ── QUESTION BANK EDITOR ── */
.qb-row{display:flex;gap:8px;align-items:flex-start;padding:.875rem;background:var(--surface2);border-radius:var(--radius-sm);border:1px solid var(--border);margin-bottom:.6rem}
.qb-num{width:28px;height:28px;background:var(--brand);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.75rem;font-weight:700;flex-shrink:0;margin-top:2px}
.qb-body{flex:1}
.qb-opts{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-top:8px}
.qb-opt-wrap{display:flex;gap:6px;align-items:center}
.qb-opt-letter{width:22px;height:22px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700;color:var(--text2);flex-shrink:0}
.qb-opt-correct{background:var(--accent)!important;color:#fff!important}
.correct-btn{padding:.2rem .5rem;font-size:.7rem;border-radius:5px;background:var(--surface3);color:var(--text3);border:none;cursor:pointer}
.correct-btn.selected{background:var(--accent-light);color:#065f46;font-weight:700}

body{font-family:'Inter',sans-serif;background:var(--surface2);color:var(--text);line-height:1.6;min-height:100vh;transition:background .25s,color .25s}
h1,h2,h3,h4,h5{font-family:'Space Grotesk',sans-serif;line-height:1.3}
button{cursor:pointer;border:none;font-family:'Inter',sans-serif}
input,select,textarea{font-family:'Inter',sans-serif}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* AUTH */
.auth-wrap{min-height:100vh;display:flex;background:linear-gradient(135deg,#1e1b4b 0%,#312e81 40%,#4338ca 100%)}
.auth-left{flex:1;display:flex;align-items:center;justify-content:center;padding:3rem;color:#fff}
.auth-left-inner{max-width:480px}
.auth-logo{display:flex;align-items:center;gap:12px;margin-bottom:2.5rem}
.auth-logo-icon{width:48px;height:48px;background:rgba(255,255,255,.15);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px}
.auth-logo-name{font-family:'Space Grotesk',sans-serif;font-size:22px;font-weight:700;letter-spacing:-.5px}
.auth-headline{font-size:2.6rem;font-weight:700;line-height:1.15;margin-bottom:1rem}
.auth-headline span{color:#a5b4fc}
.auth-sub{font-size:1.05rem;opacity:.75;margin-bottom:2.5rem;line-height:1.7}
.auth-features{display:flex;flex-direction:column;gap:14px}
.auth-feat{display:flex;align-items:center;gap:12px;font-size:.9rem;opacity:.85}
.auth-feat-dot{width:8px;height:8px;border-radius:50%;background:#a5b4fc;flex-shrink:0}
.auth-right{width:440px;background:#fff;display:flex;flex-direction:column;justify-content:center;padding:3rem}
.auth-tabs{display:flex;gap:4px;background:#f1f5f9;border-radius:10px;padding:4px;margin-bottom:2rem}
.auth-tab{flex:1;padding:.55rem;border-radius:8px;background:transparent;font-size:.875rem;font-weight:500;color:var(--text2);transition:all .2s}
.auth-tab.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}
.auth-title{font-size:1.5rem;font-weight:700;margin-bottom:.35rem}
.auth-desc{font-size:.875rem;color:var(--text2);margin-bottom:1.75rem}
.form-group{margin-bottom:1.1rem}
.form-label{display:block;font-size:.8rem;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.45rem}
.form-input{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;transition:border-color .2s,box-shadow .2s;background:#fff}
.form-input:focus{outline:none;border-color:var(--brand);box-shadow:0 0 0 3px rgba(79,70,229,.15)}
.form-select{width:100%;padding:.7rem 1rem;border:1.5px solid var(--border);border-radius:var(--radius-sm);font-size:.9rem;background:#fff;appearance:none}
.btn-primary{width:100%;padding:.75rem;background:var(--brand);color:#fff;border-radius:var(--radius-sm);font-size:.9rem;font-weight:600;transition:all .2s;letter-spacing:.2px}
.btn-primary:hover{background:var(--brand-dark);transform:translateY(-1px);box-shadow:0 4px 12px rgba(79,70,229,.35)}
.btn-primary:active{transform:translateY(0)}
.auth-divider{display:flex;align-items:center;gap:12px;margin:1.2rem 0;color:var(--text3);font-size:.8rem}
.auth-divider::before,.auth-divider::after{content:'';flex:1;height:1px;background:var(--border)}
.auth-demo{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-top:1.2rem}
.demo-btn{padding:.55rem;background:var(--surface3);border-radius:8px;font-size:.75rem;font-weight:500;color:var(--text2);transition:all .2s;text-align:center}
.demo-btn:hover{background:var(--brand-light);color:var(--brand)}
.auth-captcha-wrap{background:var(--surface3);border-radius:var(--radius-sm);padding:1rem;border:1.5px solid var(--border);margin-bottom:1.1rem;display:flex;align-items:center;justify-content:space-between}
.captcha-q{font-size:.95rem;font-weight:600;color:var(--text)}
.captcha-input{width:80px;padding:.5rem .75rem;border:1.5px solid var(--border);border-radius:6px;font-size:.9rem;text-align:center}
.captcha-refresh{width:32px;height:32px;background:var(--border);border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px;cursor:pointer}

/* APP SHELL */
.app-shell{display:flex;min-height:100vh}
.sidebar{width:var(--sidebar);background:#fff;border-right:1px solid var(--border);display:flex;flex-direction:column;position:fixed;top:0;left:0;height:100vh;z-index:100;transition:transform .3s}
.sidebar-logo{padding:1.25rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sidebar-logo-icon{width:36px;height:36px;background:var(--brand);border-radius:9px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:16px;flex-shrink:0}
.sidebar-logo-text{font-family:'Space Grotesk',sans-serif;font-size:1rem;font-weight:700;color:var(--brand)}
.sidebar-user{padding:1rem 1.5rem;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.user-avatar{width:38px;height:38px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.9rem;color:#fff;flex-shrink:0}
.user-name{font-size:.85rem;font-weight:600;color:var(--text)}
.user-role{font-size:.75rem;color:var(--text3);text-transform:capitalize}
.sidebar-nav{flex:1;overflow-y:auto;padding:1rem 0}
.nav-section{padding:.25rem 1.5rem .5rem;font-size:.7rem;font-weight:700;text-transform:uppercase;letter-spacing:1px;color:var(--text3)}
.nav-item{display:flex;align-items:center;gap:10px;padding:.65rem 1.5rem;font-size:.875rem;font-weight:500;color:var(--text2);border-radius:0;transition:all .15s;cursor:pointer;border-left:3px solid transparent;position:relative}
.nav-item:hover{background:var(--surface2);color:var(--text)}
.nav-item.active{background:var(--brand-light);color:var(--brand);border-left-color:var(--brand)}
.nav-item .nav-icon{font-size:18px;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--danger);color:#fff;font-size:.65rem;font-weight:700;padding:2px 6px;border-radius:10px}
.sidebar-bottom{padding:1rem 1.5rem;border-top:1px solid var(--border)}
.logout-btn{display:flex;align-items:center;gap:8px;font-size:.85rem;color:var(--text2);padding:.5rem .75rem;border-radius:var(--radius-sm);background:transparent;width:100%;transition:all .15s}
.logout-btn:hover{background:var(--danger-light);color:var(--danger)}
.main-content{margin-left:var(--sidebar);flex:1;min-height:100vh;display:flex;flex-direction:column}
.topbar{background:#fff;border-bottom:1px solid var(--border);padding:.875rem 2rem;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50}
.topbar-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.topbar-right{display:flex;align-items:center;gap:12px}
.notif-btn{width:36px;height:36px;background:var(--surface3);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--text2);position:relative;cursor:pointer;transition:all .15s}
.notif-btn:hover{background:var(--brand-light);color:var(--brand)}
.notif-dot{position:absolute;top:6px;right:6px;width:7px;height:7px;background:var(--danger);border-radius:50%;border:1.5px solid #fff}
.page-content{flex:1;padding:2rem;overflow-y:auto}

/* CARDS & STATS */
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:1rem;margin-bottom:2rem}
.stat-card{background:#fff;border-radius:var(--radius-lg);padding:1.25rem 1.5rem;border:1px solid var(--border);display:flex;align-items:center;gap:1rem;transition:all .2s}
.stat-card:hover{box-shadow:var(--shadow-md);transform:translateY(-1px)}
.stat-icon{width:48px;height:48px;border-radius:var(--radius);display:flex;align-items:center;justify-content:center;font-size:22px;flex-shrink:0}
.stat-body{}
.stat-label{font-size:.75rem;font-weight:600;color:var(--text3);text-transform:uppercase;letter-spacing:.5px;margin-bottom:2px}
.stat-value{font-size:1.6rem;font-weight:700;color:var(--text);line-height:1}
.stat-change{font-size:.75rem;margin-top:2px}
.stat-change.up{color:var(--accent)}
.stat-change.down{color:var(--danger)}

/* SECTION HEADER */
.section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.section-title{font-size:1.1rem;font-weight:700;color:var(--text)}
.section-sub{font-size:.8rem;color:var(--text3);margin-top:2px}
.btn-sm{padding:.4rem .9rem;border-radius:var(--radius-sm);font-size:.8rem;font-weight:600;transition:all .2s}
.btn-outline{background:transparent;border:1.5px solid var(--border2);color:var(--text2)}
.btn-outline:hover{border-color:var(--brand);color:var(--brand);background:var(--brand-light)}
.btn-brand{background:var(--brand);color:#fff;border:none}
.btn-brand:hover{background:var(--brand-dark)}
.btn-success{background:var(--accent);color:#fff;border:none}
.btn-success:hover{background:#059669}
.btn-warn{background:var(--warn);color:#fff;border:none}
.btn-danger-outline{background:transparent;border:1.5px solid var(--danger);color:var(--danger)}
.btn-danger-outline:hover{background:var(--danger-light)}

/* TABLE */
.table-wrap{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);overflow:hidden}
.data-table{width:100%;border-collapse:collapse}
.data-table th{padding:.8rem 1.25rem;font-size:.75rem;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text3);border-bottom:1px solid var(--border);background:var(--surface2);text-align:left}
.data-table td{padding:.9rem 1.25rem;font-size:.875rem;color:var(--text);border-bottom:1px solid var(--border)}
.data-table tr:last-child td{border-bottom:none}
.data-table tr:hover td{background:var(--surface2)}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:.2rem .6rem;border-radius:20px;font-size:.72rem;font-weight:600;white-space:nowrap}
.badge-success{background:var(--accent-light);color:#065f46}
.badge-warn{background:var(--warn-light);color:#92400e}
.badge-danger{background:var(--danger-light);color:#991b1b}
.badge-info{background:var(--info-light);color:#1e40af}
.badge-neutral{background:var(--surface3);color:var(--text2)}
.badge-brand{background:var(--brand-light);color:var(--brand)}

/* CARDS */
.card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem}
.card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem}
.card-title{font-size:1rem;font-weight:700;color:var(--text)}
.card-sub{font-size:.8rem;color:var(--text3);margin-top:2px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:1.25rem}
.grid-3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:1.25rem}

/* PROGRESS */
.progress-bar{height:6px;background:var(--surface3);border-radius:3px;overflow:hidden;flex:1}
.progress-fill{height:100%;border-radius:3px;transition:width .6s ease}
.skill-row{display:flex;align-items:center;gap:12px;margin-bottom:.75rem}
.skill-name{font-size:.8rem;font-weight:500;color:var(--text2);width:100px;flex-shrink:0}
.skill-score{font-size:.8rem;font-weight:700;width:36px;text-align:right;flex-shrink:0}

/* RATING STARS */
.stars{display:flex;gap:3px}
.star{font-size:16px;cursor:pointer;transition:color .15s}
.star.filled{color:#F59E0B}
.star.empty{color:var(--border2)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:1000;padding:1rem}
.modal{background:#fff;border-radius:var(--radius-xl);padding:2rem;max-width:580px;width:100%;max-height:90vh;overflow-y:auto;position:relative;box-shadow:var(--shadow-lg)}
.modal-title{font-size:1.25rem;font-weight:700;margin-bottom:.5rem}
.modal-sub{font-size:.875rem;color:var(--text2);margin-bottom:1.5rem}
.modal-close{position:absolute;top:1.25rem;right:1.25rem;width:32px;height:32px;background:var(--surface3);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;color:var(--text2)}
.modal-close:hover{background:var(--danger-light);color:var(--danger)}
.modal-footer{display:flex;gap:.75rem;justify-content:flex-end;margin-top:1.5rem;padding-top:1.25rem;border-top:1px solid var(--border)}

/* QUIZ / APTITUDE */
.quiz-wrap{max-width:680px;margin:0 auto}
.quiz-header{background:var(--brand);color:#fff;border-radius:var(--radius-lg);padding:1.5rem;margin-bottom:1.5rem}
.quiz-meta{display:flex;gap:2rem;margin-top:.75rem}
.quiz-meta-item{font-size:.85rem;opacity:.85}
.question-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;margin-bottom:1rem}
.question-num{font-size:.8rem;font-weight:700;color:var(--brand);text-transform:uppercase;letter-spacing:.5px;margin-bottom:.5rem}
.question-text{font-size:1rem;font-weight:600;color:var(--text);margin-bottom:1.25rem;line-height:1.5}
.option{display:flex;align-items:flex-start;gap:12px;padding:.75rem 1rem;border-radius:var(--radius-sm);border:1.5px solid var(--border);margin-bottom:.6rem;cursor:pointer;transition:all .2s}
.option:hover{border-color:var(--brand);background:var(--brand-light)}
.option.selected{border-color:var(--brand);background:var(--brand-light)}
.option.correct{border-color:var(--accent);background:var(--accent-light)}
.option.wrong{border-color:var(--danger);background:var(--danger-light)}
.option-letter{width:28px;height:28px;border-radius:50%;background:var(--surface3);display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:700;flex-shrink:0}
.option-text{font-size:.9rem;padding-top:3px}
.timer-bar{height:4px;background:var(--surface3);border-radius:2px;margin-top:.75rem;overflow:hidden}
.timer-fill{height:100%;background:var(--brand);border-radius:2px;transition:width .1s linear}
.timer-fill.warn{background:var(--warn)}
.timer-fill.danger{background:var(--danger)}

/* SCORE CARD */
.score-wrap{max-width:540px;margin:0 auto;text-align:center}
.score-circle{width:140px;height:140px;border-radius:50%;margin:1.5rem auto;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'Space Grotesk',sans-serif}
.score-number{font-size:2.5rem;font-weight:700}
.score-label{font-size:.8rem;opacity:.75}
.score-breakdown{display:grid;grid-template-columns:repeat(3,1fr);gap:1rem;margin:1.5rem 0}
.score-item{background:var(--surface2);border-radius:var(--radius);padding:1rem;text-align:center}
.score-item-val{font-size:1.4rem;font-weight:700;color:var(--text)}
.score-item-lab{font-size:.75rem;color:var(--text3);margin-top:2px}

/* ONBOARDING STEPPER */

.step:last-child{border-right:none}
.step.active{background:var(--brand);color:#fff}
.step.done{background:var(--accent-light);color:#065f46}
.step-num{display:block;font-size:1rem;font-weight:700;margin-bottom:2px}

.readiness-meter{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.5rem;margin-bottom:1.5rem}

.meter-labels{display:flex;justify-content:space-between;font-size:.75rem;color:var(--text3)}

/* NOTIFICATION */
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:var(--text);color:#fff;padding:.875rem 1.25rem;border-radius:var(--radius);font-size:.875rem;font-weight:500;box-shadow:var(--shadow-lg);z-index:9999;display:flex;align-items:center;gap:8px;animation:slideIn .3s ease}
@keyframes slideIn{from{transform:translateX(100%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast.success{background:var(--accent)}
.toast.error{background:var(--danger)}
.toast.warn{background:var(--warn)}

/* PROFILE */
.profile-hero{background:linear-gradient(135deg,var(--brand) 0%,var(--brand-mid) 100%);border-radius:var(--radius-lg);padding:2rem;color:#fff;margin-bottom:1.5rem;position:relative;overflow:hidden}
.profile-hero::before{content:'';position:absolute;top:-50px;right:-50px;width:200px;height:200px;border-radius:50%;background:rgba(255,255,255,.06)}
.profile-avatar{width:72px;height:72px;border-radius:50%;border:3px solid rgba(255,255,255,.4);display:flex;align-items:center;justify-content:center;font-size:1.75rem;font-weight:700;margin-bottom:1rem}
.profile-name{font-size:1.4rem;font-weight:700;margin-bottom:.25rem}
.profile-meta{display:flex;gap:1.5rem;margin-top:1rem;flex-wrap:wrap}
.profile-meta-item{font-size:.85rem;opacity:.85;display:flex;align-items:center;gap:5px}

.tabs{display:flex;gap:4px;background:var(--surface3);border-radius:var(--radius);padding:4px;margin-bottom:1.5rem}
.tab-btn{flex:1;padding:.5rem .75rem;border-radius:8px;background:transparent;font-size:.85rem;font-weight:500;color:var(--text2);transition:all .2s;cursor:pointer;border:none}
.tab-btn.active{background:#fff;color:var(--brand);box-shadow:var(--shadow)}

.upload-area{border:2px dashed var(--border2);border-radius:var(--radius-lg);padding:2.5rem;text-align:center;cursor:pointer;transition:all .2s;background:var(--surface2)}
.upload-area:hover{border-color:var(--brand);background:var(--brand-light)}
.upload-icon{font-size:2.5rem;margin-bottom:.75rem;display:block}
.upload-text{font-size:.875rem;color:var(--text2)}
.upload-sub{font-size:.75rem;color:var(--text3);margin-top:.25rem}

.chart-wrap{position:relative;width:100%}

.feedback-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.25rem;margin-bottom:.875rem;transition:all .2s}

.empty-title{font-size:1rem;font-weight:600;color:var(--text2);margin-bottom:.5rem}

.lb-rank.silver{background:#F1F5F9;color:var(--text2)}
.lb-rank.bronze{background:#FEF3C7;color:#b45309}

.ai-chat{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);display:flex;flex-direction:column;height:480px}

.msg{max-width:75%;padding:.75rem 1rem;border-radius:var(--radius);font-size:.875rem;line-height:1.6}
.msg.user{background:var(--brand);color:#fff;align-self:flex-end;border-radius:var(--radius) var(--radius) 4px var(--radius)}
.msg.ai{background:var(--surface2);color:var(--text);align-self:flex-start;border-radius:var(--radius) var(--radius) var(--radius) 4px}
.ai-input-row{padding:.875rem 1rem;border-top:1px solid var(--border);display:flex;gap:.5rem}
.ai-input{flex:1;padding:.6rem .875rem;border:1.5px solid var(--border);border-radius:20px;font-size:.875rem}
.ai-input:focus{outline:none;border-color:var(--brand)}

.roadmap-item{display:flex;gap:1rem;padding:1rem 0;border-bottom:1px solid var(--border)}
.roadmap-item:last-child{border-bottom:none}
.roadmap-line{display:flex;flex-direction:column;align-items:center;gap:4px}
.roadmap-dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;margin-top:3px}
.roadmap-track{width:2px;flex:1;background:var(--border);min-height:30px}

/* INTERVIEW PREP */
.prep-card{background:#fff;border-radius:var(--radius-lg);border:1px solid var(--border);padding:1.25rem;margin-bottom:.875rem}

  .topbar{padding:.75rem 1rem}

.spinner{width:20px;height:20px;border:2.5px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block}
@keyframes spin{to{transform:rotate(360deg)}}

.skeleton{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);background-size:200% 100%;animation:shimmer 1.5s infinite;border-radius:4px}
@keyframes shimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}

// ─── QUIZ ENGINE ──────────────────────────────────────────────────────────────
const QuizEngine=({title,questions,onComplete,timePerQ=30,color='var(--brand)',icon='🧠'})=>{
  const [idx,setIdx]=useState(0);
  const [selected,setSelected]=useState(null);
  const [answers,setAnswers]=useState([]);
  const [timeLeft,setTimeLeft]=useState(timePerQ);
  const [showResult,setShowResult]=useState(false);
  const [score,setScore]=useState(0);
  const timerRef=useRef(null);

  useEffect(()=>{
    timerRef.current=setInterval(()=>{
      setTimeLeft(t=>{
        if(t<=1){handleNext(null);return timePerQ;}
        return t-1;
      });
    },1000);
    return()=>clearInterval(timerRef.current);
  },[idx]);

  const handleSelect=(i)=>{
    if(selected!==null) return;
    setSelected(i);
    clearInterval(timerRef.current);
    setTimeout(()=>handleNext(i),800);
  };

  const handleNext=(sel)=>{
    const newAnswers=[...answers,{q:idx,selected:sel,correct:questions[idx].ans===sel}];
    setAnswers(newAnswers);
    setSelected(null);
    setTimeLeft(timePerQ);
    if(idx<questions.length-1){
      setIdx(i=>i+1);
    } else {
      clearInterval(timerRef.current);
      const sc=newAnswers.filter(a=>a.correct).length;
      const pct=Math.round((sc/questions.length)*100);
      setScore(pct);
      setShowResult(true);
    }
  };

  if(showResult){
    const correct=answers.filter(a=>a.correct).length;
    const lvl=score>=80?'Excellent':score>=60?'Good':score>=40?'Average':'Needs Work';
    const lvlColor=score>=80?'var(--accent)':score>=60?'var(--brand)':score>=40?'var(--warn)':'var(--danger)';
    return(
      <div className="score-wrap">
        <div style={{background:'#fff',borderRadius:'var(--radius-xl)',border:'1px solid var(--border)',padding:'2.5rem',textAlign:'center'}}>
          <div style={{fontSize:'3rem',marginBottom:'1rem'}}>{icon}</div>
          <h2 style={{fontSize:'1.5rem',marginBottom:'.5rem'}}>{title} — Complete!</h2>
          <div className="score-circle" style={{background:lvlColor+'20',border:`3px solid ${lvlColor}`}}>
            <span className="score-number" style={{color:lvlColor}}>{score}%</span>
            <span className="score-label" style={{color:lvlColor}}>{lvl}</span>
          </div>
          <div className="score-breakdown">
            <div className="score-item"><div className="score-item-val" style={{color:'var(--accent)'}}>{correct}</div><div className="score-item-lab">Correct</div></div>
            <div className="score-item"><div className="score-item-val" style={{color:'var(--danger)'}}>{questions.length-correct}</div><div className="score-item-lab">Wrong</div></div>
            <div className="score-item"><div className="score-item-val">{questions.length}</div><div className="score-item-lab">Total</div></div>
          </div>
          <button className="btn-brand btn-sm" style={{padding:'.65rem 2rem',fontSize:'.9rem'}} onClick={()=>onComplete(score)}>
            Save Score & Continue →
          </button>
        </div>
      </div>
    );
  }

  const q=questions[idx];
  const timerPct=(timeLeft/timePerQ)*100;
  const timerCls=timerPct>50?'':timerPct>25?'warn':'danger';

  return(
    <div className="quiz-wrap">
      <div className="quiz-header" style={{background:`linear-gradient(135deg,${color},${color}cc)`}}>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
          <h2 style={{fontSize:'1.1rem',fontWeight:700}}>{icon} {title}</h2>
          <span style={{fontSize:'1.2rem',fontWeight:700}}>{timeLeft}s</span>
        </div>
        <div className="quiz-meta">
          <span className="quiz-meta-item">Question {idx+1} of {questions.length}</span>
          <span className="quiz-meta-item">Score: {answers.filter(a=>a.correct).length} / {idx}</span>
        </div>
        <div className="timer-bar" style={{marginTop:'8px'}}>
          <div className={`timer-fill ${timerCls}`} style={{width:`${timerPct}%`}}/>
        </div>
      </div>
      <div className="question-card">
        <div className="question-num">Question {idx+1}</div>
        <div className="question-text">{q.q}</div>
        {q.opts.map((opt,i)=>{
          let cls='option';
          if(selected!==null){
            if(i===q.ans) cls+=' correct';
            else if(i===selected) cls+=' wrong';
          } else if(selected===i) cls+=' selected';
          return(
            <div key={i} className={cls} onClick={()=>handleSelect(i)}>
              <span className="option-letter">{String.fromCharCode(65+i)}</span>
              <span className="option-text">{opt}</span>
            </div>
          );
        })}
      </div>
      <div style={{background:'#fff',borderRadius:'var(--radius-lg)',padding:'1rem 1.25rem',border:'1px solid var(--border)',display:'flex',gap:'6px',alignItems:'center',justifyContent:'center'}}>
        {questions.map((_,i)=>(
          <div key={i} style={{width:'24px',height:'6px',borderRadius:'3px',background:i<idx?(answers[i]?.correct?'var(--accent)':'var(--danger)'):i===idx?color:'var(--border2)'}}/>
        ))}
      </div>
    </div>
  );
};

// ─── ONBOARDING FLOW ──────────────────────────────────────────────────────────
const OnboardingFlow=({user,onComplete})=>{
  const showToast=useContext(ToastCtx);
  const [step,setStep]=useState(0);
  const [scores,setScores]=useState({aptitude:0,softSkills:0,coding:0,goals:[]});
  const steps=['Soft Skills','Aptitude Test','Coding Test','Goal Setting'];

  const handleScore=(type,score)=>{
    setScores(s=>({...s,[type]:score}));
    setStep(s=>s+1);
  };

  const handleGoals=(answers)=>{
    const goalArr=answers.map(a=>GOAL_Q[a.q].opts[a.selected]);
    setScores(s=>({...s,goals:goalArr}));
    // save
    const users=DB.get('users')||[];
    const idx=users.findIndex(u=>u.id===user.id);
    if(idx>=0){
      users[idx]={...users[idx],softSkillsScore:scores.softSkills,aptitudeScore:scores.aptitude,codingScore:scores.coding,onboardingDone:true,goals:goalArr};
      DB.set('users',users);
      DB.set('currentUser',users[idx]);
    }
    showToast('Onboarding complete! Welcome to your dashboard 🎉');
    onComplete(users[idx]);
  };

  return(
    <div className="page-content" style={{maxWidth:'800px',margin:'0 auto',paddingTop:'2rem'}}>
      <div style={{textAlign:'center',marginBottom:'1.5rem'}}>
        <h1 style={{fontSize:'1.6rem',marginBottom:'.5rem'}}>🎯 Welcome to PlaceTrack!</h1>
        <p style={{color:'var(--text2)',fontSize:'.95rem'}}>Complete these 4 assessments to unlock your personalized dashboard. Estimated time: 15 mins</p>
      </div>
      <div className="stepper">
        {steps.map((s,i)=>(
          <div key={s} className={`step ${i===step?'active':i<step?'done':''}`}>
            <span className="step-num">{i<step?'✓':i+1}</span>
            {s}
          </div>
        ))}
      </div>
      {step===0&&<QuizEngine title="Soft Skills Assessment" questions={SOFT_SKILL_Q} onComplete={s=>handleScore('softSkills',s)} timePerQ={45} color="#8B5CF6" icon="💬"/>}
      {step===1&&<QuizEngine title="Aptitude Test" questions={APTITUDE_Q.slice(0,10)} onComplete={s=>handleScore('aptitude',s)} timePerQ={40} color="#4F46E5" icon="🧠"/>}
      {step===2&&<QuizEngine title="Coding Assessment" questions={CODING_Q} onComplete={s=>handleScore('coding',s)} timePerQ={35} color="#10B981" icon="💻"/>}
      {step===3&&<GoalSurvey onComplete={handleGoals}/>}
    </div>
  );
};

const GoalSurvey=({onComplete})=>{
  const [idx,setIdx]=useState(0);
  const [answers,setAnswers]=useState([]);
  const q=GOAL_Q[idx];
  const select=(i)=>{
    const newAns=[...answers,{q:idx,selected:i}];
    setAnswers(newAns);
    if(idx<GOAL_Q.length-1) setIdx(i=>i+1);
    else onComplete(newAns);
  };
  return(
    <div className="quiz-wrap">
      <div className="quiz-header" style={{background:'linear-gradient(135deg,#F59E0B,#EF4444)'}}>
        <h2 style={{fontSize:'1.1rem',fontWeight:700}}>🎯 Goal Setting Survey</h2>
        <div className="quiz-meta"><span className="quiz-meta-item">Question {idx+1} of {GOAL_Q.length}</span></div>
      </div>
      <div className="question-card">
        <div className="question-num">CAREER GOAL {idx+1}</div>
        <div className="question-text">{q.q}</div>
        {q.opts.map((opt,i)=>(
          <div key={i} className="option" onClick={()=>select(i)}>
            <span className="option-letter">{String.fromCharCode(65+i)}</span>
            <span className="option-text">{opt}</span>
          </div>
        ))}
      </div>
    </div>
  );
};

const StudentDashboard=({user,onNav})=>{
  const users=DB.get('users')||[];
  const me=users.find(u=>u.id===user.id)||user;
  const submissions=DB.get('submissions')||[];
  const mySubmissions=submissions.filter(s=>s.studentId===user.id);
  const overall=Math.round((me.aptitudeScore+me.softSkillsScore+me.codingScore)/3);
  const readinessScore=Math.round(
    (me.aptitudeScore*.25)+(me.softSkillsScore*.2)+(me.codingScore*.25)+(me.projectScore*4)+(me.certScore*4)
  );
  const allStudents=users.filter(u=>u.role==='student').sort((a,b)=>{
    const aS=Math.round((a.aptitudeScore+a.softSkillsScore+a.codingScore)/3);
    const bS=Math.round((b.aptitudeScore+b.softSkillsScore+b.codingScore)/3);
    return bS-aS;
  });
  const myRank=allStudents.findIndex(u=>u.id===user.id)+1;
  const skillData=[
    {name:'Aptitude',score:me.aptitudeScore,color:'#4F46E5'},
    {name:'Soft Skills',score:me.softSkillsScore,color:'#8B5CF6'},
    {name:'Coding',score:me.codingScore,color:'#10B981'},
    {name:'Projects',score:me.projectScore*20,color:'#F59E0B'},
    {name:'Certificates',score:me.certScore*20,color:'#EF4444'},
  ];

  const canvasRef=useRef(null);
  const chartInst=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    chartInst.current=new Chart(canvasRef.current,{
      type:'radar',
      data:{
        labels:['Aptitude','Soft Skills','Coding','Projects','Certificates'],
        datasets:[{
          label:'Your Score',
          data:[me.aptitudeScore,me.softSkillsScore,me.codingScore,me.projectScore*20,me.certScore*20],
          backgroundColor:'rgba(79,70,229,.15)',
          borderColor:'#4F46E5',
          borderWidth:2,
          pointBackgroundColor:'#4F46E5',
          pointRadius:4,
        }]
      },
      options:{
        responsive:true,maintainAspectRatio:false,
        plugins:{legend:{display:false}},
        scales:{r:{min:0,max:100,ticks:{stepSize:25,font:{size:10}},pointLabels:{font:{size:11,weight:'500'}}}}
      }
    });
    return()=>{if(chartInst.current) chartInst.current.destroy()};
  },[me]);

  return(
    <div>
      {/* Placement Readiness Banner */}
      <div className="readiness-meter">
        <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:'.5rem'}}>
          <div>
            <h3 style={{fontSize:'1rem',fontWeight:700}}>🎯 Placement Readiness Score</h3>
            <p style={{fontSize:'.8rem',color:'var(--text3)'}}>Based on all 5 skill areas</p>
          </div>
          <div style={{textAlign:'right'}}>
            <div style={{fontSize:'2rem',fontWeight:700,color:'var(--brand)'}}>{readinessScore}%</div>
            <Badge type={readinessScore>=75?'success':readinessScore>=50?'warn':'danger'}>
              {readinessScore>=75?'Ready for Placement':readinessScore>=50?'Almost Ready':'Needs Improvement'}
            </Badge>
          </div>
        </div>
        <div className="meter-bar-wrap"><div className="meter-fill" style={{width:`${readinessScore}%`}}/></div>
        <div className="meter-labels"><span>0%</span><span>25% — Beginner</span><span>50% — Developing</span><span>75% — Ready</span><span>100%</span></div>
      </div>

      {/* Stats */}
      <div className="stat-grid">
        {[
          {label:'Overall Score',value:`${overall}%`,icon:'📊',color:'#EEF2FF',change:'Avg of 3 tests',changeType:'neutral'},
          {label:'Batch Rank',value:`#${myRank}`,icon:'🏆',color:'#FEF3C7',change:`of ${allStudents.length} students`},
          {label:'Submissions',value:mySubmissions.length,icon:'📂',color:'#D1FAE5',change:`${mySubmissions.filter(s=>s.status==='reviewed').length} reviewed`},
          {label:'Readiness',value:`${readinessScore}%`,icon:'🎯',color:'#DBEAFE',change:readinessScore>=75?'↑ Placement ready':'↑ Keep improving'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-icon" style={{background:s.color,fontSize:'1.5rem'}}>{s.icon}</div>
            <div className="stat-body">
              <div className="stat-label">{s.label}</div>
              <div className="stat-value">{s.value}</div>
              <div className="stat-change" style={{color:'var(--text3)'}}>{s.change}</div>
            </div>
          </div>
        ))}
      </div>

      <div className="grid-2">
        {/* Skill Radar */}
        <div className="card">
          <div className="card-header">
            <div><div className="card-title">Skill Radar</div><div className="card-sub">5-area competency map</div></div>
          </div>
          <div className="chart-wrap" style={{height:'240px'}}><canvas ref={canvasRef} role="img" aria-label="Skill radar chart"/></div>
        </div>

        {/* Skill Breakdown */}
        <div className="card">
          <div className="card-header"><div className="card-title">Skill Breakdown</div></div>
          {skillData.map(s=>(
            <div key={s.name} className="skill-row">
              <span className="skill-name">{s.name}</span>
              <ProgressBar value={s.score} color={s.color}/>
              <span className="skill-score" style={{color:s.color}}>{s.score}%</span>
            </div>
          ))}
          <div style={{marginTop:'1.25rem',paddingTop:'1rem',borderTop:'1px solid var(--border)'}}>
            <div style={{fontSize:'.8rem',color:'var(--text3)',marginBottom:'.75rem'}}>Overall faculty rating</div>
            <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
              <Stars value={me.overallRating||0} readOnly/>
              <span style={{fontSize:.875+'rem',fontWeight:600,color:'var(--text2)'}}>{me.overallRating||'Not rated yet'}</span>
            </div>
          </div>
        </div>
      </div>

      {/* Quick Actions */}
      <div className="card" style={{marginTop:'1.25rem'}}>
        <div className="card-header"><div className="card-title">Quick Actions</div></div>
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:'10px'}}>
          {[
            {icon:'🧠',label:'Take Aptitude Test',nav:'aptitude',color:'#EEF2FF'},
            {icon:'💬',label:'Soft Skills Test',nav:'softskills',color:'#F3F0FF'},
            {icon:'💻',label:'Coding Assessment',nav:'coding',color:'#D1FAE5'},
            {icon:'📂',label:'Upload Project',nav:'submissions',color:'#FEF3C7'},
            {icon:'🏆',label:'Add Certificate',nav:'certificates',color:'#FEE2E2'},
            {icon:'🤖',label:'Ask AI Coach',nav:'aicoach',color:'#DBEAFE'},

            <div key={a.nav} onClick={()=>onNav(a.nav)} style={{background:a.color,borderRadius:'var(--radius)',padding:'1rem',cursor:'pointer',textAlign:'center',transition:'all .2s'}}

              onMouseLeave={e=>e.currentTarget.style.transform='none'}>

              <div style={{fontSize:'.8rem',fontWeight:600,color:'var(--text)'}}>{a.label}</div>

          ))}

      {/* Recent submissions */}
      {mySubmissions.length>0&&(
        <div className="card" style={{marginTop:'1.25rem'}}>
          <div className="card-header">
            <div><div className="card-title">Recent Submissions</div><div className="card-sub">Faculty review status</div></div>

                    <td><Badge type="info">{s.type}</Badge></td>

  );

// ─── ASSESSMENT PAGES ─────────────────────────────────────────────────────────
const AssessmentPage=({user,type})=>{
  const showToast=useContext(ToastCtx);
  const [started,setStarted]=useState(false);
  const [attempts,setAttempts]=useState(()=>{
    const a=DB.get(`attempts_${user.id}`)||{};
    return a;
  });
  const configs={
    aptitude:{title:'Aptitude Test',desc:'Logical, numerical & verbal reasoning',questions:APTITUDE_Q.slice(0,12),color:'#4F46E5',icon:'🧠',time:40,scoreKey:'aptitudeScore'},
    softskills:{title:'Soft Skills Assessment',desc:'Communication, teamwork & professional behaviour',questions:SOFT_SKILL_Q,color:'#8B5CF6',icon:'💬',time:45,scoreKey:'softSkillsScore'},
    coding:{title:'Coding Assessment',desc:'DSA, web, Python & CS fundamentals',questions:CODING_Q,color:'#10B981',icon:'💻',time:35,scoreKey:'codingScore'},
  };
  const cfg=configs[type];
  const prevScore=attempts[type];

  const handleComplete=(score)=>{
    const users=DB.get('users')||[];
    const idx=users.findIndex(u=>u.id===user.id);
    if(idx>=0){
      users[idx][cfg.scoreKey]=score;
      DB.set('users',users);
      DB.set('currentUser',users[idx]);
    }
    const att={...attempts,[type]:score};
    DB.set(`attempts_${user.id}`,att);
    setAttempts(att);
    setStarted(false);
    showToast(`${cfg.title} complete! Score: ${score}%`);
  };

  if(started) return(
    <div>
      <button className="btn-sm btn-outline" style={{marginBottom:'1rem'}} onClick={()=>setStarted(false)}>← Back</button>
      <QuizEngine {...cfg} onComplete={handleComplete}/>
    </div>
  );

  return(
    <div style={{maxWidth:'680px',margin:'0 auto'}}>
      <div className="card" style={{textAlign:'center',padding:'2.5rem'}}>
        <div style={{fontSize:'3.5rem',marginBottom:'1rem'}}>{cfg.icon}</div>
        <h2 style={{fontSize:'1.4rem',marginBottom:'.5rem'}}>{cfg.title}</h2>
        <p style={{color:'var(--text2)',marginBottom:'1.5rem'}}>{cfg.desc}</p>
        <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:'1rem',margin:'1.5rem 0'}}>
          {[{l:'Questions',v:cfg.questions.length},{l:'Time/Question',v:`${cfg.time}s`},{l:'Best Score',v:prevScore!==undefined?`${prevScore}%`:'Not taken'}].map(i=>(
            <div key={i.l} style={{background:'var(--surface2)',borderRadius:'var(--radius)',padding:'1rem'}}>
              <div style={{fontSize:'1.4rem',fontWeight:700,color:'var(--brand)'}}>{i.v}</div>
              <div style={{fontSize:'.75rem',color:'var(--text3)'}}>{i.l}</div>
            </div>
          ))}
        </div>
        {prevScore!==undefined&&(
          <div style={{background:'var(--accent-light)',borderRadius:'var(--radius)',padding:'1rem',marginBottom:'1.25rem',display:'flex',alignItems:'center',gap:'8px'}}>
            <span>✓</span>
            <span style={{fontSize:'.875rem',color:'#065f46'}}>You scored <strong>{prevScore}%</strong> on your last attempt. Retake to improve!</span>
          </div>
        )}
        <div style={{background:'var(--surface2)',borderRadius:'var(--radius)',padding:'1rem',marginBottom:'1.5rem',textAlign:'left'}}>
          <div style={{fontWeight:600,marginBottom:'.5rem',fontSize:'.9rem'}}>📋 Instructions</div>
          <ul style={{paddingLeft:'1.25rem',color:'var(--text2)',fontSize:'.85rem',lineHeight:'1.8'}}>
            <li>Each question has a {cfg.time}-second timer</li>
            <li>Auto-advances when time runs out</li>
            <li>Correct answers shown after each question</li>
            <li>Score is saved to your profile automatically</li>
          </ul>
        </div>
        <button className="btn-brand btn-sm" style={{padding:'.7rem 2.5rem',fontSize:'.95rem'}} onClick={()=>setStarted(true)}>
          Start Assessment →
        </button>
      </div>
    </div>
  );
};

// ─── AI COACH ─────────────────────────────────────────────────────────────────
const AICoachPage=({user})=>{
  const users=DB.get('users')||[];
  const me=users.find(u=>u.id===user.id)||user;
  const [messages,setMessages]=useState([
    {role:'ai',text:`Hi ${me.name}! 👋 I'm your AI placement coach. Your readiness score is ${Math.round((me.aptitudeScore*.25)+(me.softSkillsScore*.2)+(me.codingScore*.25)+(me.projectScore*4)+(me.certScore*4))}%. Ask me anything about placement prep, interview tips, coding challenges, or career planning!`}
  ]);
  const [input,setInput]=useState('');
  const [loading,setLoading]=useState(false);
  const bottomRef=useRef(null);
  useEffect(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),[messages]);

  const send=async()=>{
    if(!input.trim()||loading) return;
    const userMsg=input.trim();
    setInput('');
    setMessages(m=>[...m,{role:'user',text:userMsg}]);
    setLoading(true);
    try{
      const systemPrompt=`You are an expert placement coach for an Indian engineering college student. Student profile:
Name: ${me.name}, Department: ${me.department}, Year: ${me.year}
Aptitude: ${me.aptitudeScore}%, Soft Skills: ${me.softSkillsScore}%, Coding: ${me.codingScore}%
Career goal: ${(me.goals||['Software Development'])[0]}
Give concise, actionable, India-specific placement advice. Keep responses under 150 words. Be encouraging and specific.`;
      const resp=await fetch('https://api.anthropic.com/v1/messages',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:1000,system:systemPrompt,messages:[{role:'user',content:userMsg}]})
      });
      const data=await resp.json();
      const text=data.content?.[0]?.text||'Sorry, I could not get a response.';
      setMessages(m=>[...m,{role:'ai',text}]);
    }catch{
      setMessages(m=>[...m,{role:'ai',text:'Network error. Please check your connection and try again.'}]);
    }
    setLoading(false);
  };

  const quickQ=['How to improve my aptitude score?','Top companies hiring from my field?','Best coding resources for placements','How to write a strong resume?','Mock interview tips'];

  return(
    <div style={{maxWidth:'720px'}}>
      <div className="card" style={{marginBottom:'1rem'}}>
        <div style={{display:'flex',alignItems:'center',gap:'12px'}}>
          <div style={{width:'48px',height:'48px',background:'var(--brand)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',fontSize:'1.5rem'}}>🤖</div>
          <div>
            <div style={{fontWeight:700,fontSize:'1rem'}}>AI Placement Coach</div>
            <div style={{fontSize:'.8rem',color:'var(--text3)'}}>Powered by Claude · Personalized to your profile</div>
          </div>
          <div style={{marginLeft:'auto'}}><Badge type="success">Online</Badge></div>
        </div>
      </div>
      <div className="ai-chat">
        <div className="ai-messages">
          {messages.map((m,i)=>(
            <div key={i} className={`msg ${m.role}`} style={{whiteSpace:'pre-wrap'}}>{m.text}</div>
          ))}
          {loading&&<div className="msg ai"><span>Thinking</span><span style={{animation:'spin 1s linear infinite',display:'inline-block',marginLeft:'6px'}}>⟳</span></div>}
          <div ref={bottomRef}/>
        </div>
        <div style={{padding:'.75rem 1rem',borderTop:'1px solid var(--border)'}}>
          <div style={{display:'flex',flexWrap:'wrap',gap:'6px',marginBottom:'.75rem'}}>
            {quickQ.map(q=>(
              <button key={q} style={{padding:'.3rem .7rem',background:'var(--surface2)',border:'1px solid var(--border)',borderRadius:'20px',fontSize:'.75rem',cursor:'pointer',color:'var(--text2)'}} onClick={()=>{setInput(q);}}>{q}</button>
            ))}
          </div>
        </div>
        <div className="ai-input-row">
          <input className="ai-input" placeholder="Ask your placement coach…" value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()}/>
          <button className="ai-send" onClick={send}>→</button>
        </div>
      </div>
    </div>
  );
};

// ─── FACULTY DASHBOARD ────────────────────────────────────────────────────────
const FacultyDashboard=()=>{
  const users=DB.get('users')||[];
  const submissions=DB.get('submissions')||[];
  const students=users.filter(u=>u.role==='student');
  const pending=submissions.filter(s=>s.status==='pending').length;
  const reviewed=submissions.filter(s=>s.status==='reviewed').length;
  const canvasRef=useRef(null);
  const chartInst=useRef(null);
  useEffect(()=>{
    if(!canvasRef.current) return;
    if(chartInst.current) chartInst.current.destroy();
    const depts=[...new Set(students.map(s=>s.department))];
    const deptData=depts.map(d=>{
      const dep=students.filter(s=>s.department===d);
      return Math.round(dep.reduce((a,s)=>a+Math.round((s.aptitudeScore+s.softSkillsScore+s.codingScore)/3),0)/(dep.length||1));
    });
    chartInst.current=new Chart(canvasRef.current,{
      type:'bar',data:{labels:depts,datasets:[{label:'Avg Score',data:deptData,backgroundColor:'rgba(79,70,229,.8)',borderRadius:6}]},
      options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{y:{max:100,ticks:{callback:v=>v+'%'}}}}
    });
    return()=>{if(chartInst.current) chartInst.current.destroy()};
  },[]);

  return(
    <div>
      <div className="stat-grid">
        {[
          {label:'My Students',value:students.length,icon:'👥',color:'#EEF2FF'},
          {label:'Pending Reviews',value:pending,icon:'📋',color:'#FEF3C7'},
          {label:'Completed Reviews',value:reviewed,icon:'✅',color:'#D1FAE5'},
          {label:'Avg Readiness',value:Math.round(students.reduce((a,s)=>a+Math.round((s.aptitudeScore*.25)+(s.softSkillsScore*.2)+(s.codingScore*.25)),0)/(students.length||1))+'%',icon:'🎯',color:'#DBEAFE'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-icon" style={{background:s.color,fontSize:'1.5rem'}}>{s.icon}</div>
            <div className="stat-body"><div className="stat-label">{s.label}</div><div className="stat-value">{s.value}</div></div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card">
          <div className="card-header"><div className="card-title">Department Performance</div></div>
          <div className="chart-wrap" style={{height:'220px'}}><canvas ref={canvasRef} role="img" aria-label="Department performance chart"/></div>
        </div>
        <div className="card">
          <div className="card-header"><div className="card-title">Recent Submissions</div></div>
          {submissions.slice(0,5).map(s=>{
            const student=users.find(u=>u.id===s.studentId);

              <div key={s.id} style={{display:'flex',alignItems:'center',gap:'10px',padding:'.6rem 0',borderBottom:'1px solid var(--border)'}}>

                  <div style={{fontSize:'.875rem',fontWeight:500}}>{s.title}</div>
                  <div style={{fontSize:'.75rem',color:'var(--text3)'}}>{student?.name} · {s.type}</div>
                </div>
                <Badge type={s.status==='reviewed'?'success':'warn'}>{s.status}</Badge>

  const [users]=useState(()=>DB.get('users')||[]);
  const [rating,setRating]=useState({});
  const [comment,setComment]=useState({});
  const [filter,setFilter]=useState('pending');

  const filtered=submissions.filter(s=>filter==='all'?true:s.status===filter);

  const submitReview=(subId)=>{
    const r=rating[subId]||0;
    const c=comment[subId]||'';
    if(!r){showToast('Please give a star rating','error');return;}
    const updated=submissions.map(s=>s.id===subId?{...s,facultyId:facultyUser.id,facultyRating:r,facultyComment:c,status:'reviewed',originalityScore:Math.floor(Math.random()*30)+70}:s);
    DB.set('submissions',updated);
    setSubmissions(updated);
    // update student score
    const sub=submissions.find(s=>s.id===subId);
    if(sub){
      const studentUsers=DB.get('users')||[];
      const idx=studentUsers.findIndex(u=>u.id===sub.studentId);
      if(idx>=0){
        if(sub.type==='project') studentUsers[idx].projectScore=Math.max(studentUsers[idx].projectScore,r);
        if(sub.type==='certificate') studentUsers[idx].certScore=Math.max(studentUsers[idx].certScore,r);
        DB.set('users',studentUsers);
      }
    }
    showToast('Review submitted and scores updated!');
  };

  return(
    <div>
      <div className="section-header">
        <div><div className="section-title">📋 Review Submissions</div></div>
        <div className="tabs" style={{margin:0,width:'auto',flex:'unset'}}>
          {['pending','reviewed','all'].map(f=><button key={f} className={`tab-btn ${filter===f?'active':''}`} onClick={()=>setFilter(f)} style={{textTransform:'capitalize'}}>{f}</button>)}
        </div>
      </div>
      {filtered.length===0?<div className="card" style={{textAlign:'center',padding:'3rem'}}><div style={{fontSize:'3rem',marginBottom:'1rem'}}>✅</div><h3>All caught up!</h3><p style={{color:'var(--text3)'}}>No {filter} submissions</p></div>:(
        <div style={{display:'grid',gap:'1rem'}}>
          {filtered.map(s=>{
            const student=users.find(u=>u.id===s.studentId);
            return(
              <div key={s.id} className="card">
                <div style={{display:'flex',alignItems:'flex-start',gap:'12px',marginBottom:'1rem'}}>
                  <Avatar name={student?.name||'?'} size={44}/>
                  <div style={{flex:1}}>
                    <div style={{display:'flex',alignItems:'center',gap:'8px',flexWrap:'wrap'}}>
                      <h4 style={{fontWeight:700}}>{s.title}</h4>
                      <Badge type="info">{s.type}</Badge>
                      <Badge type={s.status==='reviewed'?'success':'warn'}>{s.status}</Badge>
                    </div>
                    <div style={{fontSize:'.85rem',color:'var(--text2)',marginTop:'2px'}}>{student?.name} · {student?.department} · {student?.year}</div>
                    <div style={{fontSize:'.8rem',color:'var(--text3)',marginTop:'4px'}}>{s.description}</div>
                  </div>
                  <div style={{fontSize:'.78rem',color:'var(--text3)',textAlign:'right',flexShrink:0}}>📅 {s.uploadedAt}</div>
                </div>
                {s.status==='pending'?(
                  <div style={{background:'var(--surface2)',borderRadius:'var(--radius)',padding:'1rem',borderTop:'1px solid var(--border)'}}>
                    <div style={{marginBottom:'1rem'}}>
                      <div style={{fontSize:'.8rem',fontWeight:600,marginBottom:'6px',color:'var(--text2)'}}>Your Rating</div>
                      <Stars value={rating[s.id]||0} onChange={v=>setRating(r=>({...r,[s.id]:v}))}/>
                    </div>
                    <div className="form-group" style={{marginBottom:'.75rem'}}>
                      <label className="form-label">Feedback Comment</label>
                      <textarea className="form-input" rows={2} placeholder="Add specific feedback for the student…" value={comment[s.id]||''} onChange={e=>setComment(c=>({...c,[s.id]:e.target.value}))}/>
                    </div>
                    <button className="btn-success btn-sm" onClick={()=>submitReview(s.id)}>Submit Review</button>
                  </div>
                ):(
                  <div style={{borderTop:'1px solid var(--border)',paddingTop:'1rem',display:'flex',alignItems:'center',gap:'12px'}}>
                    <Stars value={s.facultyRating} readOnly/>
                    <span style={{fontSize:'.875rem',color:'var(--text2)',fontStyle:'italic'}}>"{s.facultyComment}"</span>
                    {s.originalityScore>0&&<Badge type={s.originalityScore>=80?'success':'warn'}>Originality: {s.originalityScore}%</Badge>}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
};

// ─── FACULTY ANALYTICS ────────────────────────────────────────────────────────
const FacultyAnalyticsPage=()=>{
  const users=DB.get('users')||[];
  const students=users.filter(u=>u.role==='student');
  const canvasRef=useRef(null);
  const pieRef=useRef(null);
  const chart1=useRef(null);
  const chart2=useRef(null);
  useEffect(()=>{
    if(canvasRef.current){
      if(chart1.current) chart1.current.destroy();
      const ranges=[{label:'0-40%',count:0},{label:'41-60%',count:0},{label:'61-80%',count:0},{label:'81-100%',count:0}];
      students.forEach(s=>{
        const o=Math.round((s.aptitudeScore+s.softSkillsScore+s.codingScore)/3);
        if(o<=40) ranges[0].count++;
        else if(o<=60) ranges[1].count++;
        else if(o<=80) ranges[2].count++;
        else ranges[3].count++;
      });
      chart1.current=new Chart(canvasRef.current,{
        type:'bar',data:{labels:ranges.map(r=>r.label),datasets:[{label:'Students',data:ranges.map(r=>r.count),backgroundColor:['rgba(239,68,68,.8)','rgba(245,158,11,.8)','rgba(79,70,229,.8)','rgba(16,185,129,.8)'],borderRadius:6}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}}}
      });
    }
    if(pieRef.current){
      if(chart2.current) chart2.current.destroy();
      const depts=[...new Set(students.map(s=>s.department))];
      chart2.current=new Chart(pieRef.current,{
        type:'doughnut',data:{labels:depts,datasets:[{data:depts.map(d=>students.filter(s=>s.department===d).length),backgroundColor:['rgba(79,70,229,.8)','rgba(16,185,129,.8)','rgba(245,158,11,.8)','rgba(239,68,68,.8)','rgba(139,92,246,.8)']}]},
        options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom'}}}
      });
    }
    return()=>{[chart1,chart2].forEach(c=>{if(c.current) c.current.destroy()})};
  },[]);

  const avgApt=Math.round(students.reduce((a,s)=>a+s.aptitudeScore,0)/(students.length||1));
  const avgSS=Math.round(students.reduce((a,s)=>a+s.softSkillsScore,0)/(students.length||1));
  const avgCoding=Math.round(students.reduce((a,s)=>a+s.codingScore,0)/(students.length||1));
  const ready=students.filter(s=>Math.round((s.aptitudeScore*.25)+(s.softSkillsScore*.2)+(s.codingScore*.25)+(s.projectScore*4)+(s.certScore*4))>=75).length;

  return(
    <div>
      <div className="stat-grid">
        {[
          {label:'Avg Aptitude',value:avgApt+'%',icon:'🧠',color:'#EEF2FF'},
          {label:'Avg Soft Skills',value:avgSS+'%',icon:'💬',color:'#F3F0FF'},
          {label:'Avg Coding',value:avgCoding+'%',icon:'💻',color:'#D1FAE5'},
          {label:'Placement Ready',value:`${ready}/${students.length}`,icon:'🎯',color:'#FEF3C7'},
        ].map(s=>(
          <div key={s.label} className="stat-card">
            <div className="stat-icon" style={{background:s.color,fontSize:'1.5rem'}}>{s.icon}</div>
            <div className="stat-body"><div className="stat-label">{s.label}</div><div className="stat-value">{s.value}</div></div>
          </div>
        ))}
      </div>
      <div className="grid-2">
        <div className="card"><div className="card-header"><div className="card-title">Score Distribution</div></div><div className="chart-wrap" style={{height:'220px'}}><canvas ref={canvasRef} role="img" aria-label="Score distribution histogram"/></div></div>
        <div className="card"><div className="card-header"><div className="card-title">Department Breakdown</div></div><div className="chart-wrap" style={{height:'220px'}}><canvas ref={pieRef} role="img" aria-label="Department breakdown pie chart"/></div></div>
      </div>
    </div>
  );
};

    setModal(false);
    setForm({name:'',email:'',role:'student',department:'Computer Science',password:'temp123'});

        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>

      {modal&&(
        <div className="modal-overlay" onClick={e=>e.target===e.currentTarget&&setModal(false)}>

            <div className="modal-close" onClick={()=>setModal(false)}>✕</div>
            <div className="modal-title">Add Placement Record</div>
            <div className="form-group"><label className="form-label">Student</label>

            </div>
            <div className="form-group"><label className="form-label">Company</label><input className="form-input" placeholder="Google, Microsoft…" value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Role</label><input className="form-input" placeholder="Software Engineer" value={form.role} onChange={e=>setForm(f=>({...f,role:e.target.value}))}/></div>
            <div className="form-group"><label className="form-label">Package</label><input className="form-input" placeholder="12 LPA" value={form.package} onChange={e=>setForm(f=>({...f,package:e.target.value}))}/></div>

  );

// ─── QUESTION BANK EDITOR (Faculty) ──────────────────────────────────────────
const QuestionBankPage=({facultyUser})=>{
  const showToast=useContext(ToastCtx);
  const [questions,setQuestions]=useState(()=>{
    const saved=DB.get('custom_questions');
    return saved||[
      {id:'cq1',type:'aptitude',question:'What is the square root of 144?',opts:['10','11','12','13'],ans:2,category:'Number Theory',createdBy:facultyUser.id},
      {id:'cq2',type:'coding',question:'Which Python keyword is used to define a function?',opts:['func','def','function','define'],ans:1,category:'Python',createdBy:facultyUser.id},
    ];
  });
  const [tab,setTab]=useState('aptitude');
  const [adding,setAdding]=useState(false);
  const [form,setForm]=useState({type:tab,question:'',opts:['','','',''],ans:0,category:''});
  const [editId,setEditId]=useState(null);

  const myQ=questions.filter(q=>q.type===tab);
  const types=['aptitude','softskills','coding'];

  const setOpt=(i,v)=>setForm(f=>({...f,opts:f.opts.map((o,idx)=>idx===i?v:o)}));

  const save=()=>{
    if(!form.question||form.opts.some(o=>!o)){showToast('Fill all fields','error');return;}
    if(editId){
      const updated=questions.map(q=>q.id===editId?{...q,...form}:q);
      DB.set('custom_questions',updated); setQuestions(updated);
      showToast('Question updated!'); setEditId(null);
    } else {
      const nq={id:'cq'+Date.now(),...form,createdBy:facultyUser.id,createdAt:new Date().toISOString().split('T')[0]};
      const updated=[...questions,nq]; DB.set('custom_questions',updated); setQuestions(updated);
      showToast('Question added to bank!');
    }
    setAdding(false); setForm({type:tab,question:'',opts:['','','',''],ans:0,category:''});
  };

  const del=(id)=>{
    const updated=questions.filter(q=>q.id!==id);
    DB.set('custom_questions',updated); setQuestions(updated); showToast('Question removed');
  };

  const startEdit=(q)=>{
    setForm({type:q.type,question:q.question,opts:[...q.opts],ans:q.ans,category:q.category||''});
    setEditId(q.id); setAdding(true);
  };

  return(
    <div>
      <div className="section-header">
        <div><div className="section-title">📝 Question Bank Editor</div><div className="section-sub">Manage custom assessment questions · {questions.length} total</div></div>
        <button className="btn-brand btn-sm" onClick={()=>{setAdding(true);setEditId(null);setForm({type:tab,question:'',opts:['','','',''],ans:0,category:''});}}>+ Add Question</button>
      </div>
      <div className="tabs" style={{marginBottom:'1.25rem'}}>
        {types.map(t=>(
          <button key={t} className={`tab-btn ${tab===t?'active':''}`} onClick={()=>{setTab(t);setAdding(false);}}>
            {t==='aptitude'?'🧠 Aptitude':t==='softskills'?'💬 Soft Skills':'💻 Coding'} ({questions.filter(q=>q.type===t).length})
          </button>
        ))}
      </div>

      {adding&&(
        <div className="card" style={{marginBottom:'1.25rem',border:'2px solid var(--brand)'}}>
          <div className="card-header"><div className="card-title">{editId?'Edit Question':'New Question'}</div><button className="btn-sm btn-outline" onClick={()=>{setAdding(false);setEditId(null);}}>✕ Cancel</button></div>
          <div className="form-group"><label className="form-label">Question Text</label><textarea className="form-input" rows={2} placeholder="Write your question here…" value={form.question} onChange={e=>setForm(f=>({...f,question:e.target.value}))}/></div>
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'8px',marginBottom:'1rem'}}>
            {form.opts.map((o,i)=>(
              <div key={i} className="qb-opt-wrap">
                <div className={`qb-opt-letter ${form.ans===i?'qb-opt-correct':''}`}>{String.fromCharCode(65+i)}</div>
                <input className="form-input" style={{padding:'.45rem .75rem',flex:1}} placeholder={`Option ${String.fromCharCode(65+i)}`} value={o} onChange={e=>setOpt(i,e.target.value)}/>
                <button className={`correct-btn ${form.ans===i?'selected':''}`} onClick={()=>setForm(f=>({...f,ans:i}))}>{form.ans===i?'✓ Correct':'Set correct'}</button>
              </div>
            ))}
          </div>
          <div className="grid-2">
            <div className="form-group">
              <label className="form-label">Category / Topic</label>
              <input className="form-input" placeholder="e.g. Algebra, Python, Leadership…" value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}/>
            </div>
            <div className="form-group">
              <label className="form-label">Type</label>
              <select className="form-select" value={form.type} onChange={e=>setForm(f=>({...f,type:e.target.value}))}>
                <option value="aptitude">Aptitude</option>
                <option value="softskills">Soft Skills</option>
                <option value="coding">Coding</option>
              </select>
            </div>
          </div>
          <button className="btn-brand btn-sm" style={{padding:'.6rem 1.5rem'}} onClick={save}>{editId?'Update Question':'Save Question'}</button>
        </div>
      )}

      {myQ.length===0?(
        <div className="card" style={{textAlign:'center',padding:'3rem'}}>
          <div style={{fontSize:'3rem',marginBottom:'1rem'}}>📝</div>
          <h3>No custom questions yet</h3>
          <p style={{color:'var(--text3)',marginTop:'.5rem'}}>Click "+ Add Question" to build your custom question bank</p>
        </div>
      ):(
        <div style={{display:'grid',gap:'10px'}}>
          {myQ.map((q,i)=>(
            <div key={q.id} className="qb-row">
              <div className="qb-num">{i+1}</div>
              <div className="qb-body">
                <div style={{fontWeight:600,fontSize:'.9rem',marginBottom:'6px'}}>{q.question}</div>
                <div className="qb-opts">
                  {q.opts.map((o,oi)=>(
                    <div key={oi} style={{display:'flex',alignItems:'center',gap:'5px'}}>
                      <div className={`qb-opt-letter ${q.ans===oi?'qb-opt-correct':''}`}>{String.fromCharCode(65+oi)}</div>
                      <span style={{fontSize:'.82rem',color:q.ans===oi?'var(--accent)':'var(--text2)',fontWeight:q.ans===oi?600:400}}>{o}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:'flex',gap:'6px',marginTop:'8px',flexWrap:'wrap'}}>
                  {q.category&&<Badge type="info">{q.category}</Badge>}
                  {q.createdAt&&<span style={{fontSize:'.72rem',color:'var(--text3)'}}>Added {q.createdAt}</span>}
                </div>
              </div>
              <div style={{display:'flex',gap:'6px',flexShrink:0}}>
                <button className="btn-sm btn-outline" style={{fontSize:'.75rem'}} onClick={()=>startEdit(q)}>Edit</button>
                <button className="btn-sm btn-danger-outline" style={{fontSize:'.75rem'}} onClick={()=>del(q.id)}>Del</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
};
